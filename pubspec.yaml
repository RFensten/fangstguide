name: fangstguide
description: Lynhurtig opslag af fiskeriregler for danske lystfiskere.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.0
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0
  flutter_svg: ^2.0.10+1
  in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/fish_data.json
    - assets/fish/
